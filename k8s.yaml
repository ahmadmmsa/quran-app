apiVersion: v1
kind: Namespace
metadata:
  name: abrahamic-scriptures

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: abrahamic-scriptures
data:
  VITE_API_URL: "/api"

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: abrahamic-scriptures
type: Opaque
stringData:
  POSTGRES_HOST: "192.168.8.120"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "quran"
  POSTGRES_USER: "copilot"
  POSTGRES_PASSWORD: "copilot@123"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: abrahamic-scriptures
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: abrahamic-scriptures/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: backend-secrets

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: abrahamic-scriptures
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: abrahamic-scriptures
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: abrahamic-scriptures/frontend:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: frontend-config

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: abrahamic-scriptures
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: abrahamic-scriptures-ingress
  namespace: abrahamic-scriptures
spec:
  ingressClassName: nginx
  rules:
    - host: abrahamic-scriptures.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: abrahamic-scriptures
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50