version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - abrahamic-scriptures-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    networks:
      - abrahamic-network

networks:
  abrahamic-scriptures-network:
    driver: bridge
