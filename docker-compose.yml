services:
  app:
    image: quran-app
    container_name: quran_app
    restart: unless-stopped
    build:
      context: .
      labels:
        - "quran-app"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${DOCKER_PORT:-8000}:8000"
    volumes:
      - ./quran.conf:/app/quran.conf:ro
      # Editable locales: admin edits write here and the app serves it live;
      # persists across rebuilds (it's the build source too).
      - ./frontend/public/locales.json:/app/frontend/dist/locales.json:rw
    environment:
      - PORT=8000

  db:
    image: pgvector/pgvector:pg18
    container_name: postgres_event
    restart: unless-stopped
    environment:
      - POSTGRES_USER=quran
      - POSTGRES_PASSWORD=quran
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    # Just readiness — the app (not an init hook) populates the DB on startup.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quran -d quran"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  pgdata:
