<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abrahamic Scriptures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&family=Noto+Serif+Hebrew:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      .global-spinner-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 3rem;
        width: 100%;
        min-height: 250px;
      }
      .global-spinner {
        animation: rotate 2s linear infinite;
        width: 50px;
        height: 50px;
      }
      .global-spinner .path {
        stroke: #1a73e8;
        stroke-linecap: round;
        animation: dash 1.5s ease-in-out infinite;
      }
      @keyframes rotate {
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes dash {
        0% {
          stroke-dasharray: 1, 150;
          stroke-dashoffset: 0;
        }
        50% {
          stroke-dasharray: 90, 150;
          stroke-dashoffset: -35;
        }
        100% {
          stroke-dasharray: 90, 150;
          stroke-dashoffset: -124;
        }
      }
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        z-index: 99999;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <svg class="global-spinner" viewBox="0 0 50 50">
          <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle>
        </svg>
      </div>
    </div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
